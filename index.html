<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>US Rank Trainer</title>

<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    color: #f8fafc;
    padding: 18px;
  }
  h1 {
    text-align: center;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 20px;
  }
  .card {
    background: #1e293b;
    border-radius: 22px;
    padding: 24px;
    box-shadow: 0 10px 28px rgba(0,0,0,.35);
    margin-bottom: 16px;
  }
  select, button, input {
    width: 100%;
    font-size: 17px;
    padding: 15px;
    border-radius: 14px;
    border: none;
    margin: 7px 0;
  }
  select, input {
    background: #334155;
    color: white;
  }
  button {
    background: #38bdf8;
    color: #020617;
    font-weight: 700;
  }
  .secondary {
    background: #475569;
    color: white;
  }
  .danger {
    background: #f87171;
    color: #450a0a;
  }
  .question-type {
    color: #38bdf8;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .question {
    font-size: 30px;
    font-weight: 800;
    text-align: center;
    margin: 26px 0;
  }
  .small {
    color: #94a3b8;
    font-size: 14px;
    text-align: center;
  }
  .answer {
    display: none;
    background: #0f172a;
    border-radius: 16px;
    padding: 18px;
    margin-top: 14px;
    text-align: center;
    color: #a7f3d0;
    font-size: 22px;
    font-weight: 700;
  }
  .score {
    display: flex;
    justify-content: space-between;
    color: #cbd5e1;
    font-size: 15px;
    margin-top: 8px;
  }
  .result {
    text-align: center;
    min-height: 28px;
    font-size: 18px;
    font-weight: 700;
  }
</style>
</head>

<body>

<h1>US Rank Trainer</h1>
<p class="subtitle">ROK ↔ U.S. Rank Practice</p>

<div class="card">
  <select id="service">
    <option value="Army">육군 Army</option>
    <option value="Air Force">공군 Air
